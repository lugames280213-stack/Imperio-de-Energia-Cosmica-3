<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Império de Energia Cósmica - Idle Clicker</title>
    <!-- Tailwind CSS para estilização rápida e responsiva -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;600;700&display=swap');
        
        body {
            font-family: 'Rajdhani', sans-serif;
            background-color: #05050c;
            background-image: 
                radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 40px),
                radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 30px),
                radial-gradient(white, rgba(255,255,255,.1) 2px, transparent 40px);
            background-size: 550px 550px, 350px 350px, 250px 250px;
            background-position: 0 0, 40px 60px, 130px 270px;
            animation: backgroundScroll 100s linear infinite;
        }

        @keyframes backgroundScroll {
            from { background-position: 0 0, 40px 60px, 130px 270px; }
            to { background-position: 550px 550px, 390px 410px, 380px 520px; }
        }

        .font-orbitron {
            font-family: 'Orbitron', sans-serif;
        }

        /* Efeito de brilho e feedback de clique */
        .glow-star {
            filter: drop-shadow(0 0 15px rgba(239, 68, 68, 0.5));
            transition: transform 0.05s ease, filter 0.1s ease;
        }
        .glow-star:active {
            transform: scale(0.92);
            filter: drop-shadow(0 0 35px rgba(249, 115, 22, 0.8));
        }

        /* Animação para cliques críticos da estrela/planeta */
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg) scale(0.92); }
            20% { transform: translate(-3px, 0px) rotate(1deg) scale(0.92); }
            40% { transform: translate(1px, -1px) rotate(1deg) scale(0.92); }
            60% { transform: translate(-3px, 1px) rotate(0deg) scale(0.92); }
            80% { transform: translate(-1px, -1px) rotate(1deg) scale(0.92); }
            100% { transform: translate(1px, -2px) rotate(-1deg) scale(0.92); }
        }
        .shake-active {
            animation: shake 0.2s;
            filter: drop-shadow(0 0 50px rgba(239, 68, 68, 1)) !important;
        }

        /* Partículas de energia flutuantes */
        .energy-particle {
            position: absolute;
            pointer-events: none;
            animation: floatUpAndFade 1s cubic-bezier(0.25, 1, 0.5, 1) forwards;
            font-family: 'Orbitron', sans-serif;
            font-weight: bold;
            text-shadow: 0px 2px 4px rgba(0,0,0,0.8);
        }

        .energy-particle-crit {
            position: absolute;
            pointer-events: none;
            animation: critFloat 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            color: #ef4444;
            text-shadow: 0px 0px 10px rgba(239,68,68,0.8), 0px 4px 6px rgba(0,0,0,0.9);
            z-index: 50;
        }

        @keyframes floatUpAndFade {
            0% { opacity: 1; transform: translate(-50%, -50%) translateY(0) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -50%) translateY(-120px) scale(1.4); }
        }

        @keyframes critFloat {
            0% { opacity: 1; transform: translate(-50%, -50%) translateY(0) scale(0.5); }
            20% { transform: translate(-50%, -50%) translateY(-30px) scale(2.5); }
            100% { opacity: 0; transform: translate(-50%, -50%) translateY(-150px) scale(1.5); }
        }

        /* Animação especial quando a Ascensão está disponível */
        @keyframes pulse-purple {
            0%, 100% {
                box-shadow: 0 0 10px rgba(168, 85, 247, 0.6), inset 0 0 5px rgba(168, 85, 247, 0.4);
            }
            50% {
                box-shadow: 0 0 25px rgba(168, 85, 247, 1), inset 0 0 15px rgba(168, 85, 247, 0.8);
            }
        }
        .ascension-ready-active {
            animation: pulse-purple 2.5s infinite ease-in-out;
        }

        /* Esconder barra de rolagem mas manter funcionalidade */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>

        <div class="max-w-7xl mx-auto flex flex-col sm:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-3">
